name: Retrieve Panama City Beach, Florida Beach Flag Status

on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 * * * *" # Runs 30 minutes past every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  populate-current-flag-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: current-flag-status/panama-city-beach/package-lock.json
      - name: Install Dependencies
        run: npm ci
        working-directory: current-flag-status/panama-city-beach
      - name: Run Flag Status Retrieval Script
        run: node retrieve-current-flag-status.js
        working-directory: current-flag-status/panama-city-beach
      - name: Commit Flag Status File
        run: |
          git config --global user.name 'Paul Rosenthal'
          git config --global user.email 'Paul.H.Rosenthal@iCloud.com'
          git diff --quiet flag-status/panama-city-beach.txt \
          || (git add flag-status/panama-city-beach.txt \
              && git commit -m "[Automatic Commit] Update Panama City Beach Flag Status" \
              && git push)
