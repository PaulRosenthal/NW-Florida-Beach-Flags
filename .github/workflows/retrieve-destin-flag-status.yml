name: Retrieve Destin, Florida Beach Flag Status

on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 * * * *" 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  populate-current-flag-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-v1

      - name: Install Dependencies
        run: npm install
        working-directory: current-flag-status/destin
        
      - name: Install Playwright Browsers
        # This installs browsers only if the cache was missed:
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Run Flag Status Retrieval Script
        run: node retrieve-current-flag-status.js
        working-directory: current-flag-status/destin
        
      - name: Commit Flag Status File
        run: |
          git config --global user.name 'Paul Rosenthal'
          git config --global user.email 'Paul.H.Rosenthal@iCloud.com'
          git diff --quiet flag-status/destin.txt \
          || (git add flag-status/destin.txt \
              && git commit -m "[Automatic Commit] Update Destin Flag Status" \
              && git push)