name: Generate package-lock for Panama City Beach

on:
  push:
    branches: [ main ]
    paths:
      - 'current-flag-status/panama-city-beach/package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Generate package-lock.json
        working-directory: current-flag-status/panama-city-beach
        run: npm install --package-lock-only
      - name: Commit package-lock.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add current-flag-status/panama-city-beach/package-lock.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: generate package-lock.json for panama-city-beach"
            git push origin HEAD:main
          fi
